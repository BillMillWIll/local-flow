<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 540" width="660" height="540">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171a20"/>
      <stop offset="1" stop-color="#0e1015"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#59e0bf"/>
      <stop offset="1" stop-color="#74b9ff"/>
    </linearGradient>
  </defs>

  <rect width="660" height="540" rx="18" fill="url(#background)"/>
  <circle cx="80" cy="35" r="150" fill="#59e0bf" opacity="0.035"/>
  <circle cx="615" cy="360" r="190" fill="#74b9ff" opacity="0.035"/>

  <text x="330" y="66" text-anchor="middle"
        fill="#f7f8fa" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="24" font-weight="700">Local Flow installieren</text>
  <text x="330" y="94" text-anchor="middle"
        fill="#aeb6c4" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14">Local Flow nach Programme ziehen</text>

  <g opacity="0.95">
    <path d="M268 220 H382" stroke="url(#accent)" stroke-width="5"
          stroke-linecap="round"/>
    <path d="M365 204 L383 220 L365 236" fill="none"
          stroke="#74b9ff" stroke-width="5" stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
  <text x="325" y="197" text-anchor="middle"
        fill="#b7c1ce" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" font-weight="700" letter-spacing="1.5">ZIEHEN</text>

  <text x="330" y="322" text-anchor="middle"
        fill="#f7f8fa" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" font-weight="600">Fehlermeldung beim Öffnen?</text>

  <text x="150" y="350" text-anchor="middle"
        fill="#f7f8fa" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12" font-weight="600">1. Systemeinstellungen öffnen</text>

  <text x="280" y="365"
        fill="#b7c1ce" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12">2. Datenschutz &amp; Sicherheit auswählen</text>
  <text x="280" y="397"
        fill="#b7c1ce" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12">3. Ganz nach unten zu Sicherheit scrollen</text>
  <text x="280" y="429"
        fill="#b7c1ce" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12">4. Bei Local Flow „Dennoch öffnen“ klicken</text>
</svg>
